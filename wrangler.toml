name = "mailfree42584"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill42" #你的d1数据库名称
database_id = "4b8a576b-a454-4899-b204-a5087b43214d" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="admin"
GUEST_PASSWORD="guest"
JWT_TOKEN="123456"
JWT_TOKENGUEST_PASSWORD="123456"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="blog4535.de5.net"
RESEND_API_KEY="123456"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail42"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true